version: 0.1
figma:
  concepts:
    notes:
      - Use component properties over deprecated variantProperties when possible.
      - Variant values should remain string-safe for Figma.
      - Generated output should prefer component instances and auto-layout frames over raw vector reconstruction.
  root:
    page_node_type: PAGE
    screen_node_type: FRAME
    default_layout_mode: VERTICAL
    default_primary_axis_sizing_mode: AUTO
    default_counter_axis_sizing_mode: FIXED
components:
