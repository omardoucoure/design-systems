      screens: [Overview 3, Overview 4, Overview 7]
      figma_component: Badges-Tags
      swift_component: DSBadge

    - pattern: Segmented Picker (All/Read/Unread)
      screens: [Overview 5]
      figma_component: Segmented Picker
      swift_component: DSSegmentedPicker

    - pattern: Progress Circle (message count ring)
      screens: [Overview 1]
      figma_component: Progress-Circle
      swift_component: DSProgressCircle

  needs_figma_cs:
    - pattern: Search Field (search icon + text)
      screens: [Overview 2, Overview 7]
      swift_component: DSSearchField
      priority: high

  new_needed:
    - pattern: Conversation List Item (avatar + name + message preview + time + unread badge)
      screens: [Overview 1-8]
      description: Chat list row with avatar, sender name, last message preview truncated, timestamp, optional unread count badge. Some variants show first message highlighted in a card
      priority: critical  # 8 screens — every chat overview uses this

    - pattern: Stories/Status Strip (horizontal scrollable avatars with names)
      screens: [Overview 2-4, Overview 6-8]
      description: Horizontal scrollable row of circular avatars with names below. First item can be search icon. Some on light background, some on dark card
      priority: high  # 6 screens, also reusable for social feeds

    - pattern: Friends Update Strip (horizontal large rounded image cards with name overlay)
      screens: [Overview 4, Overview 6, Overview 8]
      description: Horizontal scrollable large rounded-corner image cards (stories-like) with name label at bottom
      priority: medium

    - pattern: Frequent Contacts Row (small avatars with online indicator + name)
      screens: [Overview 4, Overview 6-8]
      description: Row of small avatars with green online dot or "Live" badge, name below. Inside a card section
      priority: medium

    - pattern: Chat Bubble — Sent (right-aligned, colored background)
      screens: [Individual 1-6, Group 1-4]
      description: Right-aligned message bubble with coral/green/teal background, white/dark text, timestamp + double-checkmark (read receipt). Sender avatar on right
      priority: critical  # 10 screens

    - pattern: Chat Bubble — Received (left-aligned, light background)
      screens: [Individual 1-6, Group 1-4]
      description: Left-aligned message bubble with light/cream background, dark text, sender avatar on left, timestamp. In group chats shows sender name
      priority: critical  # 10 screens

    - pattern: Chat Image Message (rounded image inside bubble)
      screens: [Individual 1-4, Individual 6, Group 1-4]
      description: Image with rounded corners sent as a chat message. Can have avatar beside it. Full-width or partial-width in the chat flow
      priority: high  # 9 screens

    - pattern: Voice Message (play button + waveform + duration)
      screens: [Individual 2, Individual 4]
      description: Chat bubble containing play/pause button, audio waveform visualization bars, duration text (0:47), and music note icon
      priority: medium

    - pattern: Chat Input Bar (text field + action icons)
      screens: [Individual 1-6, Group 1-4]
      description: Bottom-pinned input bar with text field ("Type a message..." / "Say something..."), mic icon, send button (coral circle with arrow/paper-plane), optional camera and attachment icons
      priority: critical  # 10 screens — every chat conversation needs this

    - pattern: Chat Attachment Menu (vertical dark pill with action icons)
      screens: [Individual 5]
      description: Vertical dark rounded pill overlay with icon buttons — emoji, image, attachment, camera, video, mic, settings
      priority: medium

    - pattern: Group Member Avatars Strip (overlapping avatars + count)
      screens: [Group 1-2, Group 4]
      description: Row of overlapping circular avatars with "+26" dark circle showing remaining count. Appears below group name in header
      priority: medium

    - pattern: Group Member List (vertical stacked avatars on right side)
      screens: [Group 3]
      description: Vertical column of member avatars stacked on the right edge, with "+26" count circle at bottom
      priority: low

    - pattern: Video Play Button (coral play icon on image thumbnail)
      screens: [Group 1]
      description: Large coral circular play button overlaid on video thumbnail image in chat
      priority: low

    - pattern: Call Action Grid (2x3 grid — Add/Speaker/Keypad/Chat/Video/Mute)
      screens: [Voice 1-3]
      description: Dark card with 2x3 grid of circular icon buttons with labels — Add to call, Speaker, Keypad, Chat, Video call, Mute. Standard phone call controls
      priority: high  # needed for any calling feature

    - pattern: End Call Button (full-width coral CTA)
      screens: [Voice 1-3]
      description: Full-width coral button with phone-off icon + "End call" text at bottom of call screen
      priority: medium

    - pattern: Caller Card (photo + name + email + duration badge)
      screens: [Voice 2]
      description: Large photo with name + email overlay at bottom, call duration badge (blue "2:26") at top-right
      priority: low

    - pattern: Video Call View (full-screen remote + PIP local video)
      screens: [Video 1-2]
      description: Full-screen video of remote caller with small picture-in-picture window of local camera. Dark background. Back button + timer at top
      priority: high  # needed for video call feature

    - pattern: Video Call Controls (dark pill with action buttons)
      screens: [Video 1-2]
      description: Dark rounded pill at bottom with grid/keypad, end call (coral), and emoji/chat buttons
      priority: medium

    - pattern: Online Status Indicator (green dot on avatar)
      screens: [Overview 4, Overview 6-8, Group 4]
      description: Small green circle positioned at bottom-right of avatar indicating online status
      priority: high  # 5 screens, reusable across any social feature

    - pattern: Live Badge (red "Live" label on avatar)
      screens: [Overview 4, Overview 7]
      description: Red "Live" badge below avatar indicating active livestream
      priority: low

    - pattern: Swipe-to-Delete Row (swiped chat revealing delete button)
      screens: [Overview 3]
      description: Chat list row swiped left revealing coral delete icon button
      priority: low

