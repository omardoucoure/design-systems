      swift_component: DSTopAppBar

    - pattern: Bottom App Bar (5-tab with heart badge "26")
      screens: [Start 1-5, Cat 1-4, Single 1-7]
      figma_component: Bottom App Bar
      swift_component: DSBottomAppBar

    - pattern: Avatar
      screens: [Start 2, Start 4]
      figma_component: Avatar
      swift_component: DSAvatar

    - pattern: Badges-Tags (discount "40%", "10%")
      screens: [Start 1-4, Single 1-7, Detail 1-2, Detail 7-8]
      figma_component: Badges-Tags
      swift_component: DSBadge

    - pattern: Checkbox
      screens: [Filter 2, Filter 4]
      figma_component: Checkbox
      swift_component: DSCheckbox

    - pattern: Page Controls (dots)
      screens: [Start 1, Detail 1-2, Detail 5, Detail 7]
      figma_component: Page-Controls
      swift_component: DSPageControl

    - pattern: Segmented Picker (tabs — Women/Men/Girl/Boy, Details/Composition/Shipping)
      screens: [Cat 3-4, Detail 1]
      figma_component: Segmented Picker
      swift_component: DSSegmentedPicker

  needs_figma_cs:
    - pattern: Search Field (search bar with icon + label)
      screens: [Cat 1-4, Filter 2, Filter 4]
      swift_component: DSSearchField
      priority: high  # 6 screens

    - pattern: Image Carousel (swipeable product images with dots)
      screens: [Detail 1-2, Detail 5, Detail 7]
      swift_component: DSCarousel
      priority: high  # 4 screens

  new_needed:
    - pattern: Product Card (image + name + subtitle + price + old price + discount badge + wishlist)
      screens: [Start 1-5, Single 1-7]
      description: Card with product image, brand name, product name, current price, strikethrough old price, discount badge. Multiple layout variants — 2-col grid, horizontal list, full-width card, masonry grid
      priority: critical  # 12 screens — THE core shopping component

    - pattern: Filter Chip (scrollable horizontal pills — "Sneakers x", "41 +")
      screens: [Single 1-4]
      description: Horizontal scrollable row of filter pills. Active = dark filled with X. Inactive = outlined with +. Shows applied filters with dismiss action
      priority: high  # 4 screens, reusable for any filtered list

    - pattern: Promo Banner Card (large colored card — "80% off" + mini chart)
      screens: [Start 1, Start 3-4, Cat 4]
      description: Full-width colored card (dark/coral) with large discount text, subtitle, optional mini bar chart decoration, arrow CTA button
      priority: high  # 4 screens

    - pattern: Category List Row (name + item count + icon)
      screens: [Cat 1, Cat 3]
      description: Full-width row with category name (large text), item count, trailing category icon. With divider between rows
      priority: medium

    - pattern: Category Thumbnail Row (name + count + horizontal image strip with "See All")
      screens: [Cat 2]
      description: Section with category name + count header, then horizontal scrollable thumbnail images with coral "See All" card first
      priority: medium

    - pattern: Category Grid (icon + label in 3-column grid)
      screens: [Cat 4]
      description: 3x2 grid of category icons with labels on coral background (New, Clothes, Shoes, Bags, Accessories, Sale)
      priority: medium

    - pattern: Gender Toggle (pill — "For her ♀" / "For him ♂")
      screens: [Start 1, Start 3, Start 5]
      description: Two-option toggle pill for gender selection. Active = dark filled, inactive = outlined
      priority: low  # could use Segmented Picker

    - pattern: Product Detail Hero (large image with overlay back/share/heart buttons)
      screens: [Detail 1-9]
      description: Full-width or near-full product image with floating action buttons (back, share, heart, info, gallery). Multiple layout variants — image with card below, full-bleed with overlay, dark background
      priority: critical  # 9 screens — every detail page needs this

    - pattern: Size Selector (row/column of size buttons)
      screens: [Detail 2-3, Detail 6-8, Filter 3]
      description: Row or grid of size options (XS, S, M, L, XL, XXL or 40-46). Selected = dark filled circle/pill. Some layouts show sizes vertically alongside image
      priority: high  # 6 screens

    - pattern: Color Selector (row of color swatches with checkmark)
      screens: [Detail 7-9, Filter 3]
      description: Row of colored circles/pills. Selected shows checkmark overlay. Used for product variant and filter selection
      priority: high  # 4 screens

    - pattern: Quantity Stepper (– 1 + control)
      screens: [Detail 3, Detail 6]
      description: Dark pill or card with minus, number, plus buttons for quantity selection
      priority: high  # common e-commerce pattern

    - pattern: Star Rating (filled stars + review count)
      screens: [Detail 6]
      description: Row of filled/empty stars with "(260 Reviews)" text
      priority: medium

    - pattern: Price Row (current price + strikethrough + cart button)
      screens: [Detail 6-9]
      description: Bottom bar showing price, old price strikethrough, discount badge, and coral cart/add-to-cart button
      priority: high  # 4 screens

    - pattern: Range Slider (dual-thumb price range)
      screens: [Filter 1]
      description: Horizontal slider with two coral thumb handles for min/max price range
      priority: medium

    - pattern: Star Rating Selector (1-5 clickable stars for filter)
      screens: [Filter 1]
      description: Row of 5 star buttons (1-5) for selecting minimum rating in filters. Selected = dark filled
      priority: low

    - pattern: Filter List Row (label + selected value + arrow)
      screens: [Filter 1, Filter 3]
      description: Row showing filter name (Category, Brand, Color, Size) with current value and right arrow for drill-down
      priority: medium

    - pattern: Wishlist Button (heart icon — outlined/filled toggle)
      screens: [Single 1-7, Detail 2-3, Detail 5-9]
      description: Circular button with heart icon. Outlined = not saved, filled = saved. Appears on product cards and detail pages
      priority: high  # 14 screens

    - pattern: Floating Add to Cart CTA (coral button at bottom)
      screens: [Detail 1-3, Detail 6-9]
      description: Full-width or partial coral button anchored at bottom — "Add to Cart" with cart icon. Sometimes includes price
      priority: critical  # 7 screens

    - pattern: Info/Promo Banner Strip (thin banner with promo text)
      screens: [Detail 6]
      description: Thin coral/light banner with promotional text like "15% OFF orders with a total value over € 200"
      priority: low

