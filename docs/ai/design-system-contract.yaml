version: 0.2
system:
  name: HaHo Design System
  platforms:
    - iOS
  source_repo_focus: SwiftUI package + showcase app
  figma_file_key: "4kcXyu53LWpUMVyhPvA4hY"
  theme_axes:
    brand:
      values: [coralCamo, seaLime, mistyRose, blueHaze]
      meaning: selects primitive palette (primary color family, secondary accent, neutral scale undertone)
    style:
      values: [lightRounded, darkRounded, lightSharp, darkSharp]
      meaning: selects color mode (light/dark) and shape treatment (rounded/sharp)
  custom_color_overrides:
    description: >
      Any app importing the design system can replace primary and/or secondary colors at init time.
      Pass optional Color values to .designSystem() or ThemeProvider — all semantic tokens update automatically.
    usage: |
      // Both overrides
      ContentView()
          .designSystem(brand: .coralCamo, style: .lightRounded,
                        primaryColor: Color(hex: "#1A73E8"),
                        secondaryColor: Color(hex: "#EA4335"))

      // Primary only
      ContentView()
          .designSystem(brand: .seaLime, style: .lightRounded,
                        primaryColor: Color(hex: "#6750A4"))
    derivation:
      primary80: "primaryColor.opacity(0.7)"
      primary100: "primaryColor (exact)"
      primary120: "primaryColor darkened 15% in HSB"
      secondary10: "secondaryColor.opacity(0.08)"
      secondary40: "secondaryColor.opacity(0.35)"
      secondary100: "secondaryColor (exact)"
      secondary120: "secondaryColor darkened 10% in HSB"
    affected_tokens:
      - surfacePrimary100
      - surfacePrimary120
      - surfaceSecondary100
      - textPrimary100
      - textSecondary100
      - borderPrimary100
      - borderSecondary100
    rule: "Never pass primaryColor/secondaryColor inside component files — only at the app root .designSystem() call."
    doc: ../theming.md
  token_layers:
    - primitives
    - semantic
    - component
  source_of_truth:
    token_files:
      - ../../tokens/primitives.json
      - ../../tokens/tokens.json
    runtime_theme:
      - ../../ios/Sources/DesignSystem/Theme/ThemeConfiguration.swift
      - ../../ios/Sources/DesignSystem/Theme/Brand.swift
      - ../../ios/Sources/DesignSystem/Theme/Style.swift
    theming_doc: ../theming.md
    claude_rules: ../../CLAUDE.md
    component_yaml_dir: ./components/
    component_yaml_index: ./components/INDEX.yaml
    component_yaml_note: >
      Each component has a dedicated YAML in docs/ai/components/ with
      use_when, never_use_when, per-variant context, exact padding/spacing,
      Figma color mappings, and hard rules. Always read the component YAML
      before implementing that component.
  ai_generation_goal:
    generate_new_pages_in_figma_from_registered_components_and_patterns

generation_rules:
  required:
    - use registered DS components before raw primitives
    - select theme explicitly with brand + style
    - use semantic or component tokens for sizing, spacing, radius, and color
    - attach accessibility labels to icon-only actions
    - compose from page patterns when a matching pattern exists
    - read docs/theming.md before using any color, spacing, or radius token
    - read each component's doc (field: doc) before implementing it
  forbidden:
    - raw custom button visuals when DSButton covers the need
    - unregistered spacing scales
    - unregistered colors or radii
    - page structures that bypass DSCard when a DS container exists
    - hardcoded Color(hex:) values in page or component files (only in theme primitives)
    - Image("icon_name") string literals — always use Image(dsIcon:) with DSIcon enum
    - .font(.system(size:)) or .font(.custom(...)) — always use theme.typography tokens
  output_expectations:
    - page spec must cite used components
    - page spec must cite used page patterns
    - page spec must include accessibility notes
    - page spec must remain theme-safe across all 16 combinations

page_patterns:
  - id: auth.form-card
    family: auth
    source_examples: [LoginPage, Login2Page, Login4Page, Login6ErrorPage]
    structure:
      - DSCard
      - heading block
      - one or more DSTextField items
      - remembered-state control row
      - primary DSButton CTA
    optional:
      - DSSegmentedPicker
      - social-sign-in block
      - support text action
  - id: auth.social-sign-in
    family: auth
    source_examples: [LoginPage, Login2Page, Login4Page, Login6ErrorPage]
    structure:
      - DSCard
      - section title
      - DSButton social actions
    rules:
      - icon-only social buttons require accessibility labels
      - multi-provider rows should stay visually balanced
  - id: auth.verification
    family: auth
    source_examples: [VerifyCodePage, PasscodeLoginPage]
    structure:
      - title block
      - DSCodeInput
      - supporting text
      - primary DSButton CTA
  - id: alert.banner
    family: alerts
    source_examples: [Alert4Page, Alert5Page, Alert6Page]
    structure:
      - DSBanner or DSCard-backed banner block
      - severity icon
      - headline + body copy
      - optional dismiss action
  - id: alert.dialog
    family: alerts
    source_examples: [Alert7Page, Alert8Page, Alert9Page, Alert10Page, Alert11Page]
    structure:
      - DSAlertDialog
      - severity icon
      - title
      - message
      - stacked DSButton actions
  - id: dashboard.metrics-grid
    family: dashboard
    source_examples: [Alert4Page]
    structure:
      - DSMetricCard
      - chart or progress primitive
      - numeric summary
  - id: profile.hero
    family: profile
    source_examples: [ProfilePage, Profile4Page, Profile6Page]
    structure:
      - DSTopAppBar
      - hero media or carousel
      - DSCard summary block
      - CTA or stat row
  - id: profile.user-card
    family: profile
    source_examples: [ProfilePage, Profile3Page]
    structure:
      - DSUserCard
      - DSUserCardStat
      - sign-out + edit DSButton actions
  - id: profile.stats
    family: profile
    source_examples: [Profile2Page, Profile7Page]
    structure:
      - DSStatRow or metric summary
      - DSProgressCircle or other data-viz primitive
      - DSListItem group
  - id: onboarding.walkthrough
    family: walkthrough
    source_examples: [WalkthroughPage, Walkthrough2Page, Walkthrough3Page]
    structure:
      - visual hero block
      - DSText heading/body
      - DSPageControl or carousel progress
      - primary/secondary CTA row
  - id: shell.tab-layout
    family: shell
    source_examples: [ContentView]
    structure:
      - DSTabView (wraps all tab content)
      - ZStack with opacity switching (keep all tabs alive)
      - DSBottomAppBar (labeled, full, or floating style)
    rules:
      - never use NavigationStack switching between tabs
      - all tab NavigationStacks must coexist via opacity, not conditional rendering

components:
  # ── Actions ──────────────────────────────────────────────────────────────────
  - name: DSButton
    category: actions
    doc: ../docs/components/DSButton.md
    path: ../../ios/Sources/DesignSystem/Components/DSButton.swift
    variants: [filledA, filledB, filledC, neutral, neutralLight, outlined, outlinedLight, text]
    sizes: [big, medium, small]
    content_modes: [text, icon_only_system, icon_only_asset, text_with_left_icon, text_with_right_icon]
    ai_roles: [primary_cta, secondary_cta, tertiary_action, social_action, dismiss_action, toolbar_action]
    style_mapping:
      filledA: surfaceSecondary100 background
      filledB: surfacePrimary100 background
      filledC: surfacePrimary120 background
      neutral: surfaceNeutral2 background
      neutralLight: surfaceNeutral0_5 background (for dark surfaces)
    figma_mapping: button component variants

  - name: DSChip
    category: actions
    doc: ../docs/components/DSChip.md
    path: ../../ios/Sources/DesignSystem/Components/DSChip.swift
    variants: [filledA, filledB, filledC, neutral, outlined]
    ai_roles: [filter_chip, status_chip, tag]

  # ── Selection ─────────────────────────────────────────────────────────────────
  - name: DSCheckbox
    category: selection
    doc: ../docs/components/DSCheckbox.md
    path: ../../ios/Sources/DesignSystem/Components/DSCheckbox.swift
    states: [selected, unselected, disabled]
    ai_roles: [remember_me, checklist, consent]

  - name: DSRadio
    category: selection
    doc: ../docs/components/DSRadio.md
    path: ../../ios/Sources/DesignSystem/Components/DSRadio.swift
    states: [selected, unselected, disabled]
    ai_roles: [single_select_choice]

  - name: DSToggle
    category: selection
    doc: ../docs/components/DSToggle.md
    path: ../../ios/Sources/DesignSystem/Components/DSToggle.swift
    states: [on, off, disabled]
    ai_roles: [settings_toggle]

  - name: DSSegmentedPicker
