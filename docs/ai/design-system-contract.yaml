sample_page_families:
  walkthrough:
    files: [WalkthroughPage, Walkthrough2Page, Walkthrough3Page]
  auth:
    files: [LoginPage, Login2Page, Login4Page, Login6ErrorPage, BiometricLoginPage, PasscodeLoginPage, ForgotPasswordPage, VerifyCodePage, NewPasswordPage]
  profile:
    files: [ProfilePage, Profile2Page, Profile3Page, Profile4Page, Profile5Page, Profile6Page, Profile7Page]
  alerts:
    files: [Alert1Page, Alert2Page, Alert3Page, Alert4Page, Alert5Page, Alert6Page, Alert7Page, Alert8Page, Alert9Page, Alert10Page, Alert11Page]

known_gaps:
  - figma_component_instance_names are not yet mapped for each DS component
  - page patterns are derived from showcase screens and still need stricter constraints
  - icon-only DS APIs still depend on callers for accessibility labels in some cases
  - no validator exists yet for page specs against this contract
