  - name: DSEventCard
    category: content
    path: ../../ios/Sources/DesignSystem/Components/DSEventCard.swift
    ai_roles: [event_summary, schedule_card]
  - name: DSCard
    category: layout
    path: ../../ios/Sources/DesignSystem/Components/DSCard.swift
    ai_roles: [surface_container, section_card]
  - name: DSCarousel
    category: layout
    path: ../../ios/Sources/DesignSystem/Components/DSCarousel.swift
    variants: [spotlight, standard]
    ai_roles: [image_carousel, hero_carousel]
  - name: DSCarouselDeck
    category: layout
