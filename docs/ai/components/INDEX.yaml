version: "1.0"
description: >
  Per-component AI reference YAMLs for the HaHo Design System.
  Each file contains: use_when, never_use_when, all variants/styles/sizes with
  when-to-use context, exact padding/spacing from source, Figma color mappings,
  and hard rules for AI code generation.

meta:
  source_root: ios/Sources/DesignSystem/Components/
  theme_doc: docs/theming.md
  claude_rules: CLAUDE.md
  contract: docs/ai/design-system-contract.yaml
  figma_file_key: 4kcXyu53LWpUMVyhPvA4hY

# ─── HOW TO USE THESE FILES ──────────────────────────────────────────────────────
ai_instructions: |
  1. Read the component YAML for each component you plan to use on the page.
  2. Use `use_when` / `never_use_when` to confirm you are using the right component.
  3. Read `variants`/`styles`/`sizes` to pick the correct variant based on Figma.
  4. Read `padding_context` and `layout` for exact spacing values.
  5. Follow `rules` — these are hard constraints from the design system.
  6. Consult docs/theming.md for all token tables (colors, spacing, radius, typography).
  7. Consult CLAUDE.md for page-level patterns (ScrollView layout, toolbar hiding, etc.)

