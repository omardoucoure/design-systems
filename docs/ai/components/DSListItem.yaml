component: DSListItem
category: navigation
swift_path: ios/Sources/DesignSystem/Components/DSListItem.swift

description: >
  Themed list row with optional leading/trailing generic slots, overline, headline,
  supporting text, and metadata. Background is always surfaceNeutral2.
  Use for settings rows, menu items, notification rows, content feeds.

# ─── WHEN TO USE ────────────────────────────────────────────────────────────────
use_when:
  - Settings / preferences rows (Privacy, Notifications, Account)
  - Menu / navigation lists
  - Notification feed items
  - Any Figma element that looks like a horizontal row with icon + text + trailing element
  - Inside DSCard containers for grouped list sections

never_use_when:
  - Product cards with images → use DSProductCard
  - Event cards → use DSEventCard
  - Profile header → use DSUserCard
  - Tab navigation → use DSBottomAppBar

# ─── TEXT STRUCTURE ─────────────────────────────────────────────────────────────
text_structure:
  overline:
    font: theme.typography.small (12px medium)
    color: textNeutral9.opacity(0.75)
    use_when: Category label or section identifier above the headline (e.g., "Today", "Push")

  headline:
    font: theme.typography.bodySemiBold (16px semibold)
    color: theme.colors.textNeutral9
    required: true

  supportingText:
    font: theme.typography.body (16px medium)
    color: textNeutral8.opacity(0.75)
    use_when: Secondary description below the headline

  metadata:
    font: theme.typography.body (16px medium)
    color: textNeutral8.opacity(0.75)
    position: right of headline (after text block)
    use_when: Timestamps, counts, or status values ("2 min ago", "3")

# ─── LEADING SLOT ────────────────────────────────────────────────────────────────
leading_slot:
  description: Generic @ViewBuilder — typically icon, avatar, or image
  common_patterns:
    icon_button:
      use_when: Settings rows with category icons (lock, bell, person)
      example: |
        DSListItem(headline: "Privacy", leadingIcon: "lock", showTrailingArrow: true)
    avatar:
      use_when: Contact lists, friend feeds
      example: |
        DSListItem(headline: "John") { DSAvatar(style: .image(img)) } trailing: { ... }
    dsicon_image:
      use_when: DS catalog icons (prefer over SF Symbols)
      example: |
        DSListItem(headline: "Notifications") {
            DSIconImage(icon: .bell, size: 24)
        } trailing: { ... }

# ─── TRAILING SLOT ───────────────────────────────────────────────────────────────
trailing_slot:
  description: Generic @ViewBuilder — typically arrow, toggle, badge, or metadata
  common_patterns:
    arrow: showTrailingArrow: true (convenience init) — navigation destination
    toggle: DSToggle(isOn: $enabled)
    badge: DSBadge(variant: .numberBrand, count: 3)
    button: DSButton(style: .text, size: .small) { }
    text: DSText("Active", style: .caption, color: .validated)

# ─── DIVIDER ─────────────────────────────────────────────────────────────────────
divider:
  parameter: showDivider: Bool = false
  color: theme.colors.borderNeutral3
  position: bottom of the row (1px line)
  use_when: Between rows in a list where Figma shows separator lines

# ─── LAYOUT & SPACING ────────────────────────────────────────────────────────────
layout:
  padding: theme.spacing.md (16px) all sides
  row_gap: theme.components.listItem.rowGap (between leading and text block)
  background: theme.colors.surfaceNeutral2
  action: Wrap in Button if action is provided — the entire row becomes tappable

# ─── GROUPING PATTERN ────────────────────────────────────────────────────────────
grouping:
  pattern: |
    DSCard(background: theme.colors.surfaceNeutral2, radius: theme.radius.xl, padding: theme.spacing.md) {
        VStack(spacing: 0) {
            DSListItem(headline: "Privacy", leadingIcon: "lock", showTrailingArrow: true)
            DSListItem(headline: "Notifications", leadingIcon: "bell", showTrailingArrow: true)
            DSListItem(headline: "Appearance", leadingIcon: "paintbrush", showTrailingArrow: true)
        }
    }
  note: >
    Wrap DSListItems in a DSCard with padding: md (16px). The card padding ensures content
    and dividers never touch card edges. HaHo uses no dividers in settings lists — visual
    separation comes from DSListItem internal padding. Only add showDivider if Figma explicitly shows lines.

# ─── CONVENIENCE INIT ────────────────────────────────────────────────────────────
convenience_init:
  parameters:
    leadingIcon: String?  # SF Symbol name
    showTrailingArrow: Bool  # shows right arrow
  use_when: Simple icon + headline + arrow pattern (most settings rows)
  note: For DSIcon catalog icons, use the full generic init with leading ViewBuilder

# ─── FIGMA INSTANCE RULES ────────────────────────────────────────────────────────
figma_instance_rules:
  settings_rows: >
    When using DSListItem for settings/preferences screens:
    ALWAYS enable Leading Item with a Button (Neutral, Medium) containing a contextual icon.
    Leading icon button: surfaceNeutral0_5 fill, r360 (full circle), with icon swap to the correct icon.
    Active/selected row: override leading icon button fill to surfaceSecondary100 (coral).
    For toggle rows: enable Trailing Item with Toggle (Switch) instance.
    For navigation rows: enable Trailing Item with a chevron-right arrow icon.
    For value rows: use Metadata text (right-aligned) to show current value.
    NEVER draw manual frames for settings rows — always use DSListItem.

  no_manual_dividers: >
    NEVER create raw FRAME nodes as dividers between list items.
    HaHo settings/menu lists use Divider=False on ALL items — no dividers at all.
    Visual separation comes from DSListItem internal padding (16px) + card padding (16px/24px).
    If dividers ARE needed for a specific design, use the Divider boolean prop — never manual frames.
    Even when DSDivider IS used, it NEVER takes the full card width — the card must have
    horizontal padding (16px minimum) so dividers appear naturally inset from card edges.

  card_wrapper: >
    Multiple DSListItem instances must be wrapped in a DSCard with padding: padL=16, padR=16, padT=24, padB=24.
    NEVER use padding: 0 — that causes dividers and content to bleed to card edges.
    The card provides rounded corners (r32, surfaceNeutral2 bg) + edge padding.
    The DSListItem provides its own internal padding (16px all sides).
    Stack items with itemSpacing: 0 — visual separation comes from item padding + card padding.
    NEVER add itemSpacing between list items.

  leading_icon_mapping:
    notifications: bell
    dark_mode: moon
    auto_play: play-circle
    video_quality: video
    language: globe
    storage: hard-drive
    privacy: lock
    account: user
    help: help-circle
    sign_out: log-out

# ─── FIGMA RULES (machine-readable, used by builders + checker) ─────────────────
figma_rules:
  - id: listitem_settings_leading_icon
    trigger: after_instantiate
    condition:
      type: variant_in
      context: ["settings", "preferences", "menu"]
    action:
      type: set_component_property
      target: "self"
      property: "Leading Item"
      value: true
      sub_action:
        type: swap_component
        target: "child:Leading Item"
        value: "Button(Style=Neutral, Size=Medium, icon-only)"
    check:
      assertion: equals
      target: "self.componentProperties.Leading Item.value"
      expected: true
      fail_message: "Settings rows MUST have a leading icon button (Neutral, Medium) — never leave Leading Item disabled"
    severity: critical
    auto_fixable: true

  - id: listitem_card_padding_minimum
    trigger: after_instantiate
    condition:
      type: always
    action:
      type: set_property
      target: "parent:DSCard"
      property: "padding"
      value: ">=16"
    check:
      assertion: equals
      target: "parent.paddingLeft"
      expected: ">=16"
      fail_message: "DSCard wrapping DSListItems must have padding >= 16px (md) — NEVER use padding: 0 (causes edge-bleed)"
    severity: critical
    auto_fixable: true

  - id: listitem_no_manual_dividers
    trigger: after_append
    condition:
      type: always
    action:
      type: set_property
      target: "self"
      property: "showDivider"
      value: false
    check:
      assertion: equals
      target: "sibling_type:FRAME.height"
      expected: "none"
      fail_message: "NEVER create raw FRAME nodes as dividers — use showDivider boolean prop on DSListItem, or omit dividers entirely (HaHo default)"
    severity: critical
    auto_fixable: false

  - id: listitem_no_spacing_between
    trigger: after_append
    condition:
      type: item_count_lte
      max: 20
    action:
      type: set_property
      target: "parent"
      property: "itemSpacing"
      value: 0
    check:
      assertion: equals
      target: "parent.itemSpacing"
      expected: 0
      fail_message: "Stack DSListItems with itemSpacing: 0 — visual separation comes from item padding + card padding, not gaps"
    severity: error
    auto_fixable: true

# ─── HARD RULES ──────────────────────────────────────────────────────────────────
rules:
  - DSListItem background is always surfaceNeutral2 — do not override
  - Wrap multiple list items in DSCard(padding: md/16px) — NEVER padding: 0 (causes edge-bleed)
  - HaHo settings lists use Divider=False on all items — only add showDivider if Figma explicitly shows lines
  - If the row navigates somewhere, provide action: closure (makes row tappable)
  - Prefer DSIcon enum for leading icons over SF Symbol strings
