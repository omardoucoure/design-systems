name: VitrineApp
options:
  bundleIdPrefix: com.haho.vitrine
  deploymentTarget:
    iOS: "16.0"

packages:
  DesignSystem:
    path: ../

targets:
  VitrineApp:
    type: application
    platform: iOS
    sources: [VitrineApp]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.haho.vitrine.VitrineApp
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
    dependencies:
      - package: DesignSystem
